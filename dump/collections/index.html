<html lang="en">
<head>

<body class="bg-white">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-center mb-8">Our Collections</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <a href="/collections/custom-blockout-roller-blinds/" class="block p-6 border border-gray-200 rounded-lg hover:shadow-lg transition-shadow"><h2 class="text-xl font-semibold capitalize">custom blockout roller blinds</h2></a>
<a href="/collections/bamboo-jute-woven-roman-blinds/" class="block p-6 border border-gray-200 rounded-lg hover:shadow-lg transition-shadow"><h2 class="text-xl font-semibold capitalize">bamboo jute woven roman blinds</h2></a>
<a href="/collections/sheer-curtains/" class="block p-6 border border-gray-200 rounded-lg hover:shadow-lg transition-shadow"><h2 class="text-xl font-semibold capitalize">sheer curtains</h2></a>
<a href="/collections/plantation-shutters/" class="block p-6 border border-gray-200 rounded-lg hover:shadow-lg transition-shadow"><h2 class="text-xl font-semibold capitalize">plantation shutters</h2></a>
        </div>

        </div>
    </div>
    <script src="/assets/js/carousel.js"></script>
     <script src="/assets/js/smooth-scroll.js"></script>

    <script>
    // 移动端下拉菜单处理
    document.addEventListener('DOMContentLoaded', function() {
        const dropdowns = document.querySelectorAll('.dropdown');
        
        dropdowns.forEach(dropdown => {
            const button = dropdown.querySelector('button');
            const content = dropdown.querySelector('.dropdown-content');
            
            if (button && content) {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // 在移动端切换显示状态
                    if (window.innerWidth <= 768) {
                        dropdown.classList.toggle('active');
                    }
                });
            }
        });
        
        // 点击外部关闭下拉菜单
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown')) {
                dropdowns.forEach(dropdown => {
                    dropdown.classList.remove('active');
                });
            }
        });
    });
    </script>
</body>
</html>
